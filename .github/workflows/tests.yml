name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.4.1 numpy==1.26.4 Pillow==11.2.1 fastapi==0.139.0 pydantic==2.13.4 python-multipart==0.0.32 httpx2==2.5.0

      - name: Run unit tests
        run: |
          python -m pytest tests
