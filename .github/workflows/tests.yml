name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.4.1 numpy==1.26.4 Pillow==11.2.1 fastapi==0.139.0 pydantic==2.13.4 python-multipart==0.0.32 httpx2==2.5.0 PyJWT==2.13.0 cryptography==48.0.1 SQLAlchemy==2.0.51 "psycopg[binary]==3.3.4"

      - name: Run unit tests
        run: |
          python -m pytest tests

      - name: Run Manager Chat safety evaluation
        run: |
          python scripts/run_manager_chat_evaluation.py --output manager-chat-evaluation

      - name: Upload Manager Chat evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: manager-chat-evaluation
          path: manager-chat-evaluation

  web-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Test and build web workbench
        working-directory: web
        run: |
          pnpm test
          pnpm build
