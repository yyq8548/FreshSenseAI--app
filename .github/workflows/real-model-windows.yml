name: Real Model Windows Integration

on:
  workflow_dispatch:
    inputs:
      runtime_bundle_url:
        description: Immutable runtime bundle URL (optional; repository variable is the default)
        required: false
      runtime_bundle_sha256:
        description: Expected lowercase SHA-256 (optional; repository variable is the default)
        required: false
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read

jobs:
  real-model:
    if: ${{ inputs.runtime_bundle_url != '' || vars.FRESHSENSE_RUNTIME_BUNDLE_URL != '' }}
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      RUNTIME_BUNDLE_URL: ${{ inputs.runtime_bundle_url || vars.FRESHSENSE_RUNTIME_BUNDLE_URL }}
      RUNTIME_BUNDLE_SHA256: ${{ inputs.runtime_bundle_sha256 || vars.FRESHSENSE_RUNTIME_BUNDLE_SHA256 }}
      FRESHSENSE_EMBEDDING_LOCAL_FILES_ONLY: "true"
      FRESHSENSE_REQUIRE_OPEN_SET_GATE: "true"
      FRESHSENSE_REQUIRE_SEMANTIC_RAG: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download immutable runtime bundle
        shell: pwsh
        run: |
          if (-not $env:RUNTIME_BUNDLE_SHA256) { throw "Runtime bundle SHA-256 is required." }
          Invoke-WebRequest -Uri $env:RUNTIME_BUNDLE_URL -OutFile runtime-bundle.zip
          $actual = (Get-FileHash runtime-bundle.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $env:RUNTIME_BUNDLE_SHA256.ToLowerInvariant()) {
            throw "Runtime bundle checksum mismatch."
          }
          Expand-Archive runtime-bundle.zip -DestinationPath . -Force

      - name: Install runtime and build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Verify model/evaluation association
        run: python scripts/verify_model_artifacts.py

      - name: Run golden, OOD, semantic RAG, and secure API smoke
        run: >-
          python scripts/real_model_smoke.py
          --golden-manifest ci/golden/golden_manifest.json
          --golden-root ci/golden

      - name: Build unsigned installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build_windows.ps1

      - name: Install, launch, and uninstall smoke
        shell: pwsh
        run: >-
          powershell -ExecutionPolicy Bypass -File scripts/smoke_windows_installer.ps1
          -Version (Get-Content VERSION -Raw).Trim()

      - name: Upload reports and installer metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freshsense-real-model-windows
          path: |
            evaluation/reports/current_model/
            ../outputs/*.sha256
            ../outputs/*.json
